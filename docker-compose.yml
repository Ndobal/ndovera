services:
  ndovera-server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    env_file:
      - .env.docker
    environment:
      PORT: 3000
      NODE_ENV: production
      TRUST_PROXY: 1
      NDOVERA_IDENTITY_DB_PATH: /app/storage/ndovera-identity.db
      NDOVERA_CHAMPIONSHIP_DB_PATH: /app/storage/ndovera-championship.db
      NDOVERA_APP_DB_PATH: /app/storage/ndovera-app.db
      NDOVERA_LEGACY_STATE_PATH: /app/storage/identity-state.json
    ports:
      - "3000:3000"
    volumes:
      - ndovera_server_data:/app/packages/server/src/data
      - ndovera_server_uploads:/app/packages/server/uploads
      - ndovera_server_storage:/app/storage
      - ./identity-state.json:/app/storage/identity-state.json:ro
    init: true
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped

  ndovera-super-admin-server:
    build:
      context: .
      dockerfile: packages/super-admin-server/Dockerfile
    env_file:
      - .env.docker
    environment:
      PORT: 3001
      NODE_ENV: production
      TRUST_PROXY: 1
      NDOVERA_IDENTITY_DB_PATH: /app/storage/ndovera-identity.db
      NDOVERA_CHAMPIONSHIP_DB_PATH: /app/storage/ndovera-championship.db
      NDOVERA_APP_DB_PATH: /app/storage/ndovera-app.db
      NDOVERA_LEGACY_STATE_PATH: /app/storage/identity-state.json
    ports:
      - "3001:3001"
    volumes:
      - ndovera_super_admin_storage:/app/storage
      - ./identity-state.json:/app/storage/identity-state.json:ro
    init: true
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped

volumes:
  ndovera_server_data:
  ndovera_server_uploads:
  ndovera_server_storage:
  ndovera_super_admin_storage: