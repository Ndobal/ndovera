name = "ndovera-ami-api"
main = "src/index.ts"
compatibility_date = "2026-04-29"
compatibility_flags = ["nodejs_compat"]

[observability.logs]
enabled = true

[[d1_databases]]
binding = "AMI_DB"
database_name = "ndovera-db"
database_id = "77d6f37d-7fc8-4f5d-927c-42f3c6f24538"

[[kv_namespaces]]
binding = "SESSIONS"
id = "3b679aac9c5a44f8bcc191f1f336d9af"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "dovera-files"

[vars]
CORS_ORIGIN = "https://www.ndovera.com"
SESSION_COOKIE_NAME = "ndovera_ami_session"
SESSION_TTL_SECONDS = "2592000"
HYPERDRIVE_CONNECTION_STRING = ""

# Optional Hyperdrive binding. Add after creating Hyperdrive in Cloudflare:
# [[hyperdrive]]
# binding = "HYPERDRIVE"
# id = "REPLACE_WITH_HYPERDRIVE_ID"
