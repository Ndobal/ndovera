version: '3.8'
services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: nduser
      POSTGRES_PASSWORD: strongpassword
      POSTGRES_DB: ndovera
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  backend:
    build: .
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://nduser:strongpassword@postgres:5432/ndovera
    ports:
      - "3000:3000"
    restart: unless-stopped
volumes:
  pgdata:
