        <p>NDOVERA is an all-in-one platform that helps schools run with more structure and visible progress. It is a school management system, a public website builder for each school, and a learning-support network for owners, heads of school, teachers, accountants, parents, and students.</p>

        <ul>
          <li>Role-based dashboards for owners, heads of school (HoS), teachers, accountants, parents and students.</li>

          <li>A continuous-assessment (CA) and results engine with broadsheet ranking and an approval workflow.</li>
